name: CI

on:
  push:
    branches: [main, dev_1_1]
    paths:
      - 'Switchyard-Go/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Switchyard-Go/**'

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/jacobjgalloway/switchyard-go

jobs:
  test:
    name: Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Switchyard-Go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: Switchyard-Go/go.mod
          cache-dependency-path: Switchyard-Go/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

  build-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context:    Switchyard-Go
          file:       Switchyard-Go/deploy/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
